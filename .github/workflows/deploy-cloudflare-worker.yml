name: deploy-cloudflare-worker

on:
  push:
    branches:
      - cursor/discord-interactive-buttons-bf46
      - cursor/thread-followups-closed-queue-bf46
      - main
    paths:
      - "cloudflare/discord-interactions/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/discord-interactions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/discord-interactions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
