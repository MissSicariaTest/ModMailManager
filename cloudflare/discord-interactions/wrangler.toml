name = "spectrum-modmail-discord"
main = "src/index.ts"
compatibility_date = "2024-08-01"

# Create KV namespaces in Cloudflare Dashboard (Workers & Pages → KV),
# then paste the IDs below before your first deploy.
[[kv_namespaces]]
binding = "TICKETS"
id = "REPLACE_WITH_TICKETS_KV_ID"

[[kv_namespaces]]
binding = "REPORT"
id = "REPLACE_WITH_REPORT_KV_ID"
